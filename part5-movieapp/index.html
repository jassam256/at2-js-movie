<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admit One</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <header>
      <h1 class="t-upper">Admit One</h1>
    </header>

    <main>
      <!-- CONTROLS SECTION - search, sort, add -->
      <div class="controls-section">
        <div class="controls-header flex">
          <h2 class="t-upper">Controls</h2>
          <button type="button" class="btn btn-primary flex center">_</button>
        </div>
        <section class="search-section">
          <label for="search"><h3>Search</h3></label>
          <input type="text" name="search" id="search-string" />
          <button type="button" class="btn btn-secondary">By Title</button>
          <button type="button" class="btn btn-secondary">By ID</button>
        </section>
        <section class="sort-section">
          <h3>Sort</h3>
          <button type="button" class="btn btn-secondary">A - Z</button>
          <button type="button" class="btn btn-secondary">Z - A</button>
          <button type="button" class="btn btn-secondary">Rating</button>
          <button type="button" class="btn btn-secondary">ID</button>
        </section>
        <section class="add-section">
          <div class="add-header">
            <h3>Add</h3>
            <button type="button" class="btn btn-success">Add Entry</button>
          </div>
          <form class="add-form">
            <div class="form-group">
              <label for="add-id">ID: </label>
              <input type="text" name="id" id="add-id" />
            </div>
            <div class="form-group">
              <label for="add-title">Title: </label>
              <input type="text" name="title" id="add-title" />
            </div>
            <div class="form-group">
              <label for="add-year">Year: </label>
              <input type="text" name="year" id="add-year" />
            </div>
            <div class="form-group">
              <label for="add-rating">Rating: </label>
              <input type="text" name="rating" id="add-rating" />
            </div>
            <div class="add-form-btns">
              <button type="button" class="btn btn-success">Save</button>
              <button type="button" class="btn btn-danger">Cancel</button>
            </div>
          </form>
        </section>
      </div>

      <section class="list-section">
        <div class="list-header flex">
          <h2 class="t-upper">Movie List</h2>
          <button type="button" class="btn btn-primary flex center">⟳</button>
        </div>
        <div class="table-wrapper">
          <table>
            <colgroup>
              <col style="width: 42px" />
              <col style="width: auto" />
              <col style="width: 80px" />
              <col style="width: 100px" />
              <col style="width: 140px" />
            </colgroup>
            <thead>
              <tr>
                <th class="col-id">ID</th>
                <th class="col-title">Title</th>
                <th class="col-year">Year</th>
                <th class="col-rating">Rating</th>
                <th class="col-actions">Actions</th>
              </tr>
            </thead>
            <tbody id="list">
              <!-- MOVIES GO HERE -->
              <tr class="movie-row edit">
                <td class="col-id">1</td>
                <td class="col-title">High School Musical</td>
                <td class="col-year">2006</td>
                <td class="col-rating">★★★★☆</td>
                <td class="col-actions">
                  <button type="button" class="btn btn-success">Edit</button>
                  <button type="button" class="btn btn-danger">Delete</button>
                </td>
              </tr>
              <tr class="movie-row">
                <td class="col-id">2</td>
                <td class="col-title">High School Musical 2</td>
                <td class="col-year">2007</td>
                <td class="col-rating">★★★★★</td>
                <td class="col-actions">
                  <button type="button" class="btn btn-success">Edit</button>
                  <button type="button" class="btn btn-danger">Delete</button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="./js/movie.js"></script>
    <script src="./js/app.js"></script>
  </body>
</html>
