<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admit One</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <header>
      <h1>Admit One</h1>
    </header>

    <main>
      <!-- CONTROLS SECTION - search, sort, add -->
      <div class="controls-section">
        <section class="search-section">
          <label for="search"><h2>Search</h2></label>
          <input type="text" name="search" id="search-string" />
          <button type="button">By Title</button>
          <button type="button">By ID</button>
        </section>
        <section class="sort-section">
          <h2>Sort</h2>
          <button type="button">A - Z</button>
          <button type="button">Z - A</button>
          <button type="button">By Rating</button>
          <button type="button">By ID</button>
        </section>
        <section class="add-section">
          <h2>Add</h2>
          <button type="button">Add Entry</button>
          <form class="add-form hide">
            <label for="add-id">ID: </label>
            <input type="text" name="id" id="add-id" />
            <label for="add-title">Title: </label>
            <input type="text" name="title" id="add-title" />
            <label for="add-year">Year: </label>
            <input type="text" name="year" id="add-year" />
            <label for="add-rating">Rating: </label>
            <input type="text" name="rating" id="add-rating" />
            <div class="add-form-btns">
              <button type="button">Save</button>
              <button type="button">Cancel</button>
            </div>
          </form>
        </section>
      </div>

      <section class="list-section">
        <h2>Movie List</h2>
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Title</th>
              <th>Year</th>
              <th>Rating</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="list">
            <!-- MOVIES GO HERE -->
          </tbody>
        </table>
      </section>
    </main>

    <script src="./js/movie.js"></script>
    <script src="./js/app.js"></script>
  </body>
</html>
